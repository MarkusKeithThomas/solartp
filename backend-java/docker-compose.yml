version: '3.9'
services:
  mysql:
    image: mysql:8.0.36
    container_name: mysql_local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Hit@My5QL
      MYSQL_DATABASE: solartp
      MYSQL_PASSWORD: Hit@My5QL
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_local:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis_local
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_local
    restart: always
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/solartp
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hit@My5QL
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: 4XKjK9AL/B0qX2msu3FIC4udzH+V2MsGg7TTPKbafbo=
      FRONTEND_URL: https://solartp.com.vn
      SPRING_MAIL_PASSWORD: reqjmbypjqkrpasl
    networks:
      - app-network

volumes:
  mysql_data_local:

networks:
  app-network: